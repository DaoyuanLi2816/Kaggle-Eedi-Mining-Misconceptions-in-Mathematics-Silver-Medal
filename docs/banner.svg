<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 250" role="img" aria-label="labelbank — retrieve and rerank over a closed label bank: no in-batch negatives, self-mined hard negative pools, generative listwise reranking">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#082f49"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <clipPath id="bgclip">
      <rect x="0" y="0" width="880" height="250" rx="16"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="880" height="250" rx="16" fill="url(#bg)"/>
  <g clip-path="url(#bgclip)">
    <circle cx="790" cy="0" r="190" fill="#22d3ee" opacity="0.07"/>
    <circle cx="350" cy="265" r="150" fill="#38bdf8" opacity="0.05"/>
  </g>

  <!-- ===== left column: brand ===== -->
  <text x="40" y="84" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="#ffffff">labelbank</text>
  <rect x="42" y="94" width="64" height="3" rx="1.5" fill="#22d3ee" opacity="0.9"/>
  <text x="40" y="124" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14.5" fill="#cbd5e1">Retrieve + rerank over a closed label bank</text>

  <!-- stage chips -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" text-anchor="middle">
    <rect x="40" y="140" width="70" height="24" rx="12" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.65"/>
    <text x="75" y="156" fill="#6ee7b7">retrieve</text>
    <rect x="118" y="140" width="48" height="24" rx="12" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.65"/>
    <text x="142" y="156" fill="#93c5fd">mine</text>
    <rect x="174" y="140" width="60" height="24" rx="12" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-opacity="0.65"/>
    <text x="204" y="156" fill="#fde68a">rerank</text>
  </g>

  <!-- silver medal pill -->
  <rect x="40" y="178" width="232" height="28" rx="14" fill="#cbd5e1" fill-opacity="0.10" stroke="#cbd5e1" stroke-opacity="0.55"/>
  <circle cx="58" cy="192" r="8.5" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="58" y="195.5" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e2e8f0">&#9733;</text>
  <text x="73" y="196" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#e2e8f0">Kaggle Silver &#183; Top 5% &#183; Eedi</text>

  <!-- pip install pill -->
  <rect x="40" y="214" width="196" height="26" rx="13" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="54" y="231" font-family="ui-monospace, SFMono-Regular, Consolas, 'Courier New', monospace" font-size="12.5" fill="#e2e8f0">$ pip install labelbank</text>

  <!-- ===== card 1: no in-batch negatives ===== -->
  <g>
    <rect x="350" y="30" width="156" height="190" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.13"/>
    <circle cx="380" cy="62" r="16" fill="#38bdf8" fill-opacity="0.14" stroke="#38bdf8" stroke-opacity="0.55" stroke-width="1.4"/>
    <g stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round">
      <line x1="372" y1="56" x2="388" y2="56"/>
      <line x1="372" y1="62" x2="383" y2="62"/>
      <line x1="372" y1="68" x2="378" y2="68"/>
    </g>
    <circle cx="383" cy="68" r="0.9" fill="#38bdf8"/>
    <circle cx="387" cy="68" r="0.9" fill="#38bdf8"/>
    <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
      <text x="366" y="102" font-size="14" font-weight="700" fill="#f1f5f9">No in-batch</text>
      <text x="366" y="120" font-size="14" font-weight="700" fill="#f1f5f9">negatives</text>
      <text x="366" y="142" font-size="11.5" fill="#94a3b8">explicit mined pools,</text>
      <text x="366" y="158" font-size="11.5" fill="#94a3b8">CE over the group</text>
      <text x="366" y="180" font-size="10.5" fill="#fcd34d" fill-opacity="0.9">byte-equal to the</text>
      <text x="366" y="195" font-size="10.5" fill="#fcd34d" fill-opacity="0.9">medal-winning loss</text>
    </g>
  </g>

  <!-- ===== card 2: self-mined hard negatives ===== -->
  <g>
    <rect x="520" y="30" width="156" height="190" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.13"/>
    <circle cx="550" cy="62" r="16" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.55" stroke-width="1.4"/>
    <g stroke="#34d399" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="542" y1="58" x2="556" y2="58"/>
      <path d="M 553 54.8 L 558 58 L 553 61.2"/>
      <line x1="558" y1="66" x2="544" y2="66"/>
      <path d="M 547 62.8 L 542 66 L 547 69.2"/>
    </g>
    <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
      <text x="536" y="102" font-size="14" font-weight="700" fill="#f1f5f9">Self-mined</text>
      <text x="536" y="120" font-size="14" font-weight="700" fill="#f1f5f9">hard negatives</text>
      <text x="536" y="142" font-size="11.5" fill="#94a3b8">rank the whole bank;</text>
      <text x="536" y="158" font-size="11.5" fill="#94a3b8">top-k becomes the pool</text>
      <text x="536" y="180" font-size="10.5" fill="#fcd34d" fill-opacity="0.9">gold-first, iterative,</text>
      <text x="536" y="195" font-size="10.5" fill="#fcd34d" fill-opacity="0.9">round over round</text>
    </g>
  </g>

  <!-- ===== card 3: listwise reranker ===== -->
  <g>
    <rect x="690" y="30" width="156" height="190" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.13"/>
    <circle cx="720" cy="62" r="16" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="1.4"/>
    <g stroke="#a78bfa" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="714" y="53" width="12" height="17" rx="2"/>
      <line x1="717" y1="59" x2="723" y2="59"/>
      <line x1="717" y1="64" x2="723" y2="64"/>
    </g>
    <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
      <text x="706" y="102" font-size="14" font-weight="700" fill="#f1f5f9">Listwise</text>
      <text x="706" y="120" font-size="14" font-weight="700" fill="#f1f5f9">reranker</text>
      <text x="706" y="142" font-size="11.5" fill="#94a3b8">lettered candidates,</text>
      <text x="706" y="158" font-size="11.5" fill="#94a3b8">gold position shuffled</text>
      <text x="706" y="180" font-size="10.5" fill="#fcd34d" fill-opacity="0.9">letter logits &#8212;</text>
      <text x="706" y="195" font-size="10.5" fill="#fcd34d" fill-opacity="0.9">no position prior</text>
    </g>
  </g>
</svg>
